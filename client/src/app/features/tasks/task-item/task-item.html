<div>
  <div
    class="checkbox"
    tabindex="0"
    (click)="onToggle()"
    (keydown.enter)="onToggle()"
    (keydown.space)="onToggle()"
  >
    @if (completedTask()) {
      <mat-icon>check</mat-icon>
    }
  </div>
  <span [class.completed]="completedTask()">{{ task().title }}</span>
  <p [class.completed]="completedTask()">{{ task().description }}</p>
  <button (click)="onDelete()">Delete</button>
</div>
